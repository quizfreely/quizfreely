name: Production End-to-End Tests
on:
  workflow_dispatch:
    inputs:
      baseUrl:
        required: true
        type: string
        default: "https://quizfreely.org"
        description: "Base URL"
      # enableOauthGoogle:
      #   required: true
      #   type: boolean
      #   default: true
      #   description: "Enable/Test Google OAuth"
      enableTermImages:
        required: true
        type: boolean
        default: true
        description: "Enable/Test Term Images"
  workflow_call:
    inputs:
      baseUrl:
        required: true
        type: string
        default: "https://quizfreely.org"
      # enableOauthGoogle:
      #   required: true
      #   type: boolean
      #   default: true
      enableTermImages:
        required: true
        type: boolean
        default: true
jobs:
  tests:
    name: Run Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install Dependencies
      run: npm ci
    - name: Install Playwright Browsers
      #run: npx playwright install --with-deps
      run: npx playwright install chromium
    - name: Run Playwright tests
      env:
        ENABLE_HTML_REPORTER: true
        ENABLE_GH_REPORTER: true
        DEPLOYED: true
        BASE_URL: ${{ inputs.baseUrl }}
        # ENABLE_OAUTH_GOOGLE: ${{ inputs.enableOauthGoogle }}
        ENABLE_OAUTH_GOOGLE: false
        ENABLE_TERM_IMAGES: ${{ inputs.enableTermImages }}
      run: npx playwright test
    - name: Upload HTML Report
      if: always()
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.STORAGE_DEV_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_DEV_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: 'garage'
        AWS_ENDPOINT_URL: 'http://server.quizfreely.org:3900'
      run: |
        REPORT_DIR='prod-e2e-tests/run-${{ github.run_id }}-${{ github.run_attempt }}'
        aws s3 cp playwright-report s3://dev/$REPORT_DIR/ --recursive
        echo "### Test Report" >> $GITHUB_STEP_SUMMARY
        echo "View Test Report: https://dev.static.quizfreely.org/$REPORT_DIR/" >> $GITHUB_STEP_SUMMARY
