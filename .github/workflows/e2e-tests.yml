name: End-to-End Tests
on:
  # push:
  #   branches: [ main, master ]
  #pull_request:
  #  types: [opened, synchronize]
  #  branches: [ main ]
  workflow_dispatch:
jobs:
  tests:
    name: Run Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install Dependencies
      run: npm ci
    - name: Install Playwright Browsers
      #run: npx playwright install --with-deps
      run: npx playwright install chromium
    - name: Run Playwright tests
      run: npx playwright test
    - name: Upload HTML Report
      if: always()
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.STORAGE_DEV_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_DEV_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: 'garage'
        AWS_ENDPOINT_URL: 'http://server.quizfreely.org:3900'
      run: |
        REPORT_DIR='tests/run-${{ github.run_id }}-${{ github.run_attempt }}'
        aws s3 cp playwright-report s3://dev/$REPORT_DIR/ --recursive
        echo "### Test Report" >> $GITHUB_STEP_SUMMARY
        echo "View Test Report: https://dev.static.quizfreely.org/$REPORT_DIR/" >> $GITHUB_STEP_SUMMARY
