schema {
  query: Query
  mutation: Mutation
}

"""
Directs the executor to defer this fragment when the `if` argument is true or undefined.
"""
directive @defer(
  """Deferred when true or undefined."""
  if: Boolean = true
  """Unique name"""
  label: String
) on FRAGMENT_SPREAD | INLINE_FRAGMENT

enum AnswerWith {
  DEF
  TERM
}

enum AuthType {
  OAUTH_GOOGLE
  USERNAME_PASSWORD
}

type AuthedUser {
  authType: AuthType
  displayName: String
  id: ID
  modPerms: Boolean
  oauthGoogleEmail: String
  username: String
}

type FRQ {
  answerWith: AnswerWith
  answeredString: String
  correct: Boolean
  term: Term
  userMarkedCorrect: Boolean
}

input FRQInput {
  answerWith: AnswerWith
  answeredString: String
  correct: Boolean
  term: TermInput
  userMarkedCorrect: Boolean
}

type Folder {
  id: ID
  name: String
  studysetCount: Int!
  studysetDrafts(after: String, before: String, first: Int = 24, last: Int): StudysetConnection!
  studysets(after: String, before: String, first: Int = 24, last: Int): StudysetConnection!
  user: User
}

type FolderConnection {
  edges: [FolderEdge!]!
  pageInfo: PageInfo!
}

type FolderEdge {
  cursor: String!
  node: Folder!
}

type MCQ {
  answerWith: AnswerWith
  answeredTerm: Term
  correct: Boolean
  correctChoiceIndex: Int
  distractors: [Term]
  term: Term
}

input MCQInput {
  answerWith: AnswerWith
  answeredTerm: TermInput
  correct: Boolean
  correctChoiceIndex: Int
  distractors: [TermInput]
  term: TermInput
}

type MatchQuestion {
  answerWith: AnswerWith
  answeredTerm: Term
  correct: Boolean
  group: Int
  term: Term
}

input MatchQuestionInput {
  answerWith: AnswerWith
  answeredTerm: TermInput
  correct: Boolean
  group: Int
  term: TermInput
}

type Mutation {
  createFolder(name: String!): Folder
  createStudyset(draft: Boolean!, folderId: ID, studyset: StudysetInput!): Studyset
  createTerms(studysetId: ID!, terms: [NewTermInput!]!): [Term]
  deleteFolder(id: ID!): ID
  deleteStudyset(id: ID!): ID
  deleteTerms(ids: [ID!]!, studysetId: ID!): [ID!]
  recordConfusedTerms(confusedTerms: [TermConfusionPairInput]): Boolean
  recordPracticeTest(input: PracticeTestInput): PracticeTest
  removeStudysetFromFolder(studysetId: ID!): Boolean
  renameFolder(id: ID!, name: String!): Folder
  saveStudyset(studysetId: ID!): Boolean
  setStudysetFolder(folderId: ID!, studysetId: ID!): Boolean
  unsaveStudyset(studysetId: ID!): Boolean
  updatePracticeTest(input: PracticeTestInput): PracticeTest
  updateStudyset(draft: Boolean!, id: ID!, studyset: StudysetInput): Studyset
  updateTermProgress(termProgress: [TermProgressInput!]!): [TermProgress]
  updateTerms(studysetId: ID!, terms: [TermInput!]!): [Term]
  updateUser(displayName: String): AuthedUser
}

input NewTermInput {
  def: String
  sortOrder: Int!
  term: String
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type PracticeTest {
  id: ID
  questions: [Question]
  questionsCorrect: Int
  questionsTotal: Int
  studysetId: ID
  timestamp: String
}

input PracticeTestInput {
  id: ID
  questions: [QuestionInput]
  questionsCorrect: Int
  questionsTotal: Int
  studysetId: ID
  timestamp: String
}

type Query {
  allSubjects: [Subject]
  authed: Boolean
  authedUser: AuthedUser
  folder(id: ID!): Folder
  myFolders(after: String, first: Int = 24): FolderConnection!
  mySavedStudysetCount: Int!
  mySavedStudysets(after: String, before: String, first: Int = 24, last: Int): StudysetConnection!
  myStudysetCount(hideFoldered: Boolean, includeDrafts: Boolean = false): Int!
  myStudysetDrafts(after: String, before: String, first: Int = 24, hideFoldered: Boolean, last: Int): StudysetConnection!
  myStudysets(after: String, before: String, first: Int = 24, hideFoldered: Boolean, last: Int): StudysetConnection!
  practiceTest(id: ID!): PracticeTest
  recentlyCreatedStudysets(after: String, before: String, first: Int = 24, last: Int): StudysetConnection!
  recentlyUpdatedStudysets(after: String, before: String, first: Int = 24, last: Int): StudysetConnection!
  searchStudysetCount(q: String!): Int!
  searchStudysets(after: String, before: String, first: Int = 24, last: Int, q: String!): StudysetConnection!
  studyset(id: ID!): Studyset
  studysetCount(after: String, includeDrafts: Boolean = false, includePrivate: Boolean = false): Int!
  studysetUpdateCount(after: String, includeDrafts: Boolean = false, includePrivate: Boolean = false): Int!
  subject(id: String!): Subject
  subjectsByCategory(category: SubjectCategory): [Subject]
  subjectsByKeyword(keyword: String): [Subject]
  term(id: ID!): Term
  user(id: ID!): User
}

type Question {
  frq: FRQ
  matchQuestionInput: MatchQuestion
  mcq: MCQ
  questionType: QuestionType
  trueFalseQuestion: TrueFalseQuestion
}

input QuestionInput {
  frq: FRQInput
  matchQuestion: MatchQuestionInput
  mcq: MCQInput
  questionType: QuestionType
  trueFalseQuestion: TrueFalseQuestionInput
}

enum QuestionType {
  FRQ
  MATCH
  MCQ
  TRUE_FALSE
}

type Studyset {
  createdAt: String
  draft: Boolean
  folder: Folder
  id: ID
  practiceTests: [PracticeTest]
  private: Boolean
  saved: Boolean
  subject: Subject
  terms: [Term]
  termsCount: Int
  title: String
  updatedAt: String
  user: User
}

type StudysetConnection {
  edges: [StudysetEdge!]!
  pageInfo: PageInfo!
}

type StudysetEdge {
  cursor: String!
  node: Studyset!
}

input StudysetInput {
  private: Boolean!
  subjectId: ID
  title: String!
}

type Subject {
  category: SubjectCategory
  id: String
  name: String
  studysetCount: Int!
  studysets(after: String, before: String, first: Int = 24, last: Int): StudysetConnection!
}

enum SubjectCategory {
  LA
  LANG
  MATH
  SOCIAL_STUDIES
  STEM
}

type Term {
  createdAt: String
  def: String
  defImageUrl: String
  id: ID
  progress: TermProgress
  progressHistory: [TermProgressHistory]
  sortOrder: Int
  term: String
  termImageUrl: String
  topConfusionPairs: [TermConfusionPair]
  topReverseConfusionPairs: [TermConfusionPair]
  updatedAt: String
}

type TermConfusionPair {
  answeredWith: AnswerWith
  confusedCount: Int
  confusedTerm: Term
  id: ID
  lastConfusedAt: String
  term: Term
}

input TermConfusionPairInput {
  answeredWith: AnswerWith
  confusedAt: String
  confusedCountIncrease: Int
  confusedTermId: ID
  termId: ID
}

input TermInput {
  def: String
  id: ID!
  sortOrder: Int
  term: String
}

type TermProgress {
  defCorrectCount: Int
  defFirstReviewedAt: String
  defIncorrectCount: Int
  defLastReviewedAt: String
  defLeitnerSystemBox: Int
  defReviewCount: Int
  id: ID
  termCorrectCount: Int
  termFirstReviewedAt: String
  termIncorrectCount: Int
  termLastReviewedAt: String
  termLeitnerSystemBox: Int
  termReviewCount: Int
}

type TermProgressHistory {
  defCorrectCount: Int
  defIncorrectCount: Int
  id: ID
  termCorrectCount: Int
  termIncorrectCount: Int
  timestamp: String
}

input TermProgressInput {
  defCorrectIncrease: Int
  defIncorrectIncrease: Int
  defLeitnerSystemBox: Int
  defReviewedAt: String
  termCorrectIncrease: Int
  termId: ID!
  termIncorrectIncrease: Int
  termLeitnerSystemBox: Int
  termReviewedAt: String
}

type TrueFalseQuestion {
  answerWith: AnswerWith
  answeredBool: Boolean
  correct: Boolean
  distractor: Term
  term: Term
}

input TrueFalseQuestionInput {
  answerWith: AnswerWith
  answeredBool: Boolean
  correct: Boolean
  distractor: TermInput
  term: TermInput
}

type User {
  displayName: String
  id: ID
  studysetCount(includePrivate: Boolean = false): Int!
  studysets(after: String, before: String, first: Int = 24, includePrivate: Boolean = false, last: Int): StudysetConnection!
  username: String
}