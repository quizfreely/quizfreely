query PublicStudyset($id: ID!) {
    authed
    authedUser {
        id
        username
        displayName
    }
    studyset(id: $id) {
        id
        title
        updatedAt
        user {
            id
            displayName
        }
        private
        saved
        folder {
            id
            name
        }
        terms {
            id
            term
            def
            termImageUrl
            defImageUrl
        }
    }
}
