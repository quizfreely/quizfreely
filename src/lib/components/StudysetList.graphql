query StudysetListLoadPageCloud($first: Int, $after: String, $last: Int, $before: String) {
  myStudysets(
    first: $first
    after: $after
    last: $last
    before: $before
    hideFoldered: true
  ) {
    edges {
      node {
        id
        title
        private
        termsCount
        updatedAt
        folder {
          id
          name
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

query StudysetListLoadPageFolder($id: ID!, $first: Int, $after: String, $last: Int, $before: String) {
  folder(id: $id) {
    id
    studysets(first: $first, after: $after, last: $last, before: $before) {
      edges {
        node {
          id
          title
          private
          termsCount
          updatedAt
          folder {
            id
            name
          }
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}

