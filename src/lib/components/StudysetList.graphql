query StudysetListLoadFolderData($id: ID!) {
  folder(id: $id) {
    id
    name
    studysets(first: 24) {
      edges {
        node {
          id
          title
          termsCount
          folder {
            id
            name
          }
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
