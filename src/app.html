<!DOCTYPE html>
<html lang="en" class="theme-%theme%">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="/favicon.ico" sizes="32x32">
        <link rel="icon" href="/icon.svg" type="image/svg+xml">
        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <link rel="stylesheet" href="%sveltekit.assets%/immutable/css/ehui-2026-05-26.min.css" />
        <link rel="stylesheet" href="%sveltekit.assets%/immutable/themes/%theme%-2026-05-26.min.css" />
        %sveltekit.head%
        %enable_umami%<script
            defer
            src="/umami/script.js"
            data-website-id="%umami_site_id%"
            data-auto-track="false"
            data-performance="true"
            onload="window.umami.track()"
        ></script>%enable_umami_end%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
