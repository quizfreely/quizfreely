query SearchResults($q: String!, $first: Int, $after: String, $last: Int, $before: String) {
  authed
  authedUser {
    id
    username
    displayName
    authType
    oauthGoogleEmail
  }
  searchStudysets(q: $q, first: $first, after: $after, last: $last, before: $before) {
    edges {
      node {
        id
        title
        user {
          id
          displayName
        }
        termsCount
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
