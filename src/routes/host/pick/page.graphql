query HostPickPage {
  authed
  authedUser {
    id
    username
    displayName
  }
  myStudysets(first: 500, hideFoldered: true) {
    edges {
      node {
        id
        title
        private
        termsCount
        updatedAt
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
  myFolders(first: 500) {
    edges {
      node {
        id
        name
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
  mySavedStudysets(first: 500) {
    edges {
      node {
        id
        title
        private
        termsCount
        updatedAt
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
